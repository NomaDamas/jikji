<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Jikji — Local file maps for AI agents</title>
  <desc id="desc">A visual overview of raw agent filesystem crawling versus Jikji map-first local file discovery.</desc>
  <defs>
    <radialGradient id="bg1" cx="16%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#7dd9ff" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#7dd9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="90%" cy="4%" r="48%">
      <stop offset="0%" stop-color="#b8a1ff" stop-opacity="0.32"/>
      <stop offset="72%" stop-color="#b8a1ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd9ff"/>
      <stop offset="100%" stop-color="#65f2ad"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#7dd9ff"/>
      <stop offset="100%" stop-color="#65f2ad"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff8e8e"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65f2ad"/>
      <stop offset="100%" stop-color="#7dd9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .muted { fill: #aab5ca; }
      .text { fill: #f5f8ff; }
      .blue { fill: #7dd9ff; }
      .green { fill: #65f2ad; }
      .amber { fill: #ffd166; }
      .panel { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.14); stroke-width: 1.2; }
      .inner { fill: rgba(7,11,20,0.63); stroke: rgba(255,255,255,0.12); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="#070b14"/>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <rect width="1200" height="675" fill="url(#bg2)"/>

  <g class="sans">
    <g transform="translate(64 42)">
      <rect x="0" y="0" width="42" height="42" rx="14" fill="url(#mark)"/>
      <text x="21" y="28" text-anchor="middle" font-size="22" font-weight="950" fill="#06101c">직</text>
      <text x="56" y="29" font-size="26" font-weight="950" class="text">Jikji</text>
      <rect x="878" y="4" width="218" height="34" rx="17" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.15)"/>
      <text x="987" y="27" text-anchor="middle" font-size="14" font-weight="750" class="muted">Local file maps for AI agents</text>
    </g>

    <text x="600" y="128" text-anchor="middle" font-size="63" font-weight="950" letter-spacing="-3.6" fill="url(#titleGrad)">Agents find files without wandering</text>
    <text x="600" y="167" text-anchor="middle" font-size="21" font-weight="520" class="muted">Non-destructive maps, document text caches, and instant search indexes for local AI agents.</text>

    <g transform="translate(84 204)" filter="url(#shadow)">
      <rect class="panel" x="0" y="0" width="504" height="276" rx="28"/>
      <rect x="24" y="22" width="76" height="26" rx="13" fill="rgba(255,209,102,0.14)"/>
      <text x="62" y="40" text-anchor="middle" font-size="12" font-weight="950" class="amber">AS-IS</text>
      <text x="24" y="82" font-size="28" font-weight="900" class="text">Raw agent crawls</text>

      <g transform="translate(24 108)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#bad)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">1</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">Guess search terms repeatedly</text>
        <text x="48" y="34" font-size="12" class="muted">키워드가 빗나가면 다시 시도</text>
      </g>
      <g transform="translate(24 160)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#bad)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">2</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">List, grep, open many folders</text>
        <text x="48" y="34" font-size="12" class="muted">PDF/HWP/Office 본문 확인 반복</text>
      </g>
      <g transform="translate(24 212)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#bad)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">3</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">Spend exploratory turns</text>
        <text x="48" y="34" font-size="12" class="muted">중복·decoy·비슷한 파일에서 헤맴</text>
      </g>
    </g>

    <g transform="translate(612 204)" filter="url(#shadow)">
      <rect class="panel" x="0" y="0" width="504" height="276" rx="28"/>
      <rect x="24" y="22" width="76" height="26" rx="13" fill="rgba(101,242,173,0.14)"/>
      <text x="62" y="40" text-anchor="middle" font-size="12" font-weight="950" class="green">TO-BE</text>
      <text x="24" y="82" font-size="28" font-weight="900" class="text">Agent + Jikji map</text>

      <g transform="translate(24 108)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#good)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">1</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">Call jikji brief ROOT "query"</text>
        <text x="48" y="34" font-size="12" class="muted">ranked paths + evidence + folder context</text>
      </g>
      <g transform="translate(24 160)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#good)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">2</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">Reuse parser caches and index</text>
        <text x="48" y="34" font-size="12" class="muted">.jikji/doc_text + search_index.sqlite</text>
      </g>
      <g transform="translate(24 212)">
        <rect class="inner" x="0" y="0" width="456" height="44" rx="15"/>
        <circle cx="23" cy="22" r="14" fill="url(#good)"/><text x="23" y="27" text-anchor="middle" font-size="13" font-weight="900" fill="#07101c">3</text>
        <text x="48" y="19" font-size="15" font-weight="850" class="text">Verify only best candidates</text>
        <text x="48" y="34" font-size="12" class="muted">원본 파일 이동·삭제·이름변경 없음</text>
      </g>
    </g>

    <g transform="translate(84 508)">
      <rect class="panel" x="0" y="0" width="1092" height="104" rx="28"/>
      <g transform="translate(34 25)">
        <text x="0" y="18" font-size="13" font-weight="800" class="muted">RAW HERMES AVG</text>
        <text x="0" y="56" font-size="38" font-weight="950" class="amber">91.571s</text>
      </g>
      <g transform="translate(300 25)">
        <text x="0" y="18" font-size="13" font-weight="800" class="muted">JIKJI DIRECT AVG</text>
        <text x="0" y="56" font-size="38" font-weight="950" class="green">0.800s</text>
      </g>
      <g transform="translate(560 25)">
        <text x="0" y="18" font-size="13" font-weight="800" class="muted">LATENCY BENEFIT</text>
        <text x="0" y="56" font-size="38" font-weight="950" class="green">114x</text>
      </g>
      <g transform="translate(820 25)">
        <text x="0" y="18" font-size="13" font-weight="800" class="muted">HIT@10</text>
        <text x="0" y="56" font-size="38" font-weight="950" class="green">0.75 → 1.00</text>
      </g>
    </g>

    <g transform="translate(84 635)" class="mono">
      <text x="0" y="0" font-size="15" class="blue">000_JIKJI_AGENT_MAP.md</text>
      <text x="245" y="0" font-size="15" class="muted">.jikji/search_index.sqlite</text>
      <text x="505" y="0" font-size="15" class="muted">.jikji/doc_text/</text>
      <text x="695" y="0" font-size="15" class="muted">file_cards.jsonl</text>
      <text x="890" y="0" font-size="15" class="muted">agent_routes.md</text>
    </g>
  </g>
</svg>
